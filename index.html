<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meshez Kadi - Invitation Management System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-icon">🎴</div><h1>Meshez Kadi</h1><p>Invitation Management System</p></div>
    <div class="auth-tabs"><button class="auth-tab active" onclick="switchAuthTab('login')">Ingia</button><button class="auth-tab" onclick="switchAuthTab('register')">Jisajili</button></div>
    <div id="loginForm"><div class="form-group"><label>Barua Pepe</label><input type="email" id="loginEmail" placeholder="barua@pepe.com"></div><div class="form-group"><label>Nenosiri</label><input type="password" id="loginPassword" placeholder="••••••••"></div><button class="btn btn-primary" onclick="login()" style="margin-top:8px;">🔐 Ingia</button></div>
    <div id="registerForm" style="display:none;"><div class="input-row"><div class="form-group"><label>Jina la Kwanza</label><input type="text" id="regFirstName" placeholder="Ezekiel"></div><div class="form-group"><label>Jina la Familia</label><input type="text" id="regLastName" placeholder="Meshack"></div></div><div class="form-group"><label>Barua Pepe</label><input type="email" id="regEmail" placeholder="barua@pepe.com"></div><div class="form-group"><label>Nenosiri</label><input type="password" id="regPassword" placeholder="Herufi 6 au zaidi"></div><div class="form-group"><label>Jukumu</label><select id="regRole"><option value="admin">Admin</option><option value="scanner">Scanner</option><option value="manager">Manager</option></select></div><button class="btn btn-primary" onclick="register()" style="margin-top:8px;">✅ Jisajili</button></div>
  </div>
</div>
<div class="app" id="mainApp">
  <div class="mobile-header"><button class="hamburger" onclick="openSidebar()">☰</button><div style="color:white;font-weight:600;font-family:'Playfair Display',serif;">Meshez Kadi</div></div>
  <div class="sidebar" id="sidebar"><div class="sidebar-logo"><div class="sidebar-logo-icon">🎴</div><div class="sidebar-logo-text"><h2>Meshez Kadi</h2><span>Invitation System</span></div></div>
    <nav class="sidebar-nav"><button class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span> Dashboard</button><button class="nav-item" onclick="showPage('events')"><span class="icon">🎉</span> Event Management</button><button class="nav-item" onclick="showPage('templates')"><span class="icon">🎨</span> Template Management</button></nav>
  </div>
  <div class="main"><div class="topbar"><div><div class="topbar-title" id="topbarTitle">Dashboard</div></div><div class="topbar-actions"><button class="btn btn-orange btn-sm" onclick="showModal('newEventModal')">+ Event Mpya</button></div></div>
    <div class="content">
      <div class="page active" id="page-dashboard"><div id="dashboardEvents"></div></div>
      <div class="page" id="page-events"><div class="event-grid" id="eventsGrid"></div></div>
      <div class="page" id="page-templates"><div id="templatesList"></div></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
