<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Meshez Kadi System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Ukurasa wa Login (Utaonekana kwanza) -->
    <div id="auth-container" class="card">
        <h2>Meshez Kadi - Ingia</h2>
        <input type="email" id="email" placeholder="Baruapepe">
        <input type="password" id="password" placeholder="Neno la siri">
        <button onclick="signIn()" class="btn-primary">Ingia</button>
        <button onclick="signUp()">Jisajili</button>
    </div>

    <!-- Dashboard (Itakuwa hidden mpaka mtu aingie) -->
    <div id="dashboard-container" style="display:none; display:flex;">
        <div class="sidebar">
        <h2>Meshez Kadi</h2>
        <nav>
            <a href="#" onclick="showSection('dashboard')">Dashboard</a>
            <a href="#" onclick="showSection('events')">Event Management</a>
            <a href="#" onclick="showSection('templates')">Template Management</a>
            <a href="#" onclick="showSection('invitations')">Send Invitations</a>
            <a href="#" onclick="showSection('scanner')">Scanner</a>
            <a href="#" onclick="showSection('whatsapp')">WhatsApp Monitor</a>
            <a href="#" onclick="showSection('payments')">Payments</a>
            <a href="#" onclick="showSection('settings')">Settings</a>
        </nav>
    </div>
    
    <main id="content">
        <h1>Karibu kwenye Meshez Kadi System</h1>
        <div id="data-container"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
<div class="card">
    <input type="text" id="eventTitle" placeholder="Jina la Tukio">
    <textarea id="eventDescription" placeholder="Maelezo ya tukio"></textarea>
    <input type="text" id="eventVenue" placeholder="Ukumbi">
    <input type="date" id="eventDate">
    <button onclick="saveEvent()" class="btn-primary">Hifadhi Tukio</button>
</div>
